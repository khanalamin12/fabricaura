<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Add Product</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root{
    --bg:#0f1115; --card:#171a21; --border:#2a2e38; --text:#eef0f3;
    --muted:#9aa3b2; --accent:#5b8cff; --accent-h:#4475ff;
    --ok:#2bb673; --err:#e5484d;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:24px 16px 80px;
  }
  .wrap{max-width:560px;margin:0 auto;}
  h1{font-size:20px;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:13px;margin:0 0 24px;}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:20px; margin-bottom:16px;
  }
  label{display:block;font-size:13px;color:var(--muted);margin:14px 0 6px;}
  label:first-child{margin-top:0;}
  input, select, textarea{
    width:100%; background:#0f1218; border:1px solid var(--border); color:var(--text);
    border-radius:9px; padding:10px 12px; font-size:15px; outline:none;
  }
  input:focus, select:focus, textarea:focus{border-color:var(--accent);}
  textarea{resize:vertical; min-height:70px; font-family:inherit;}
  .row{display:flex; gap:12px;}
  .row > div{flex:1;}
  button{
    width:100%; background:var(--accent); color:#fff; border:none; border-radius:10px;
    padding:13px; font-size:15px; font-weight:600; cursor:pointer; margin-top:18px;
  }
  button:hover{background:var(--accent-h);}
  button:disabled{opacity:.5; cursor:not-allowed;}
  .msg{
    border-radius:10px; padding:12px 14px; font-size:14px; margin-top:14px; display:none;
  }
  .msg.ok{display:block; background:rgba(43,182,115,.12); color:var(--ok); border:1px solid rgba(43,182,115,.3);}
  .msg.err{display:block; background:rgba(229,72,77,.12); color:var(--err); border:1px solid rgba(229,72,77,.3);}
  .hint{font-size:12px; color:var(--muted); margin-top:6px;}
  .lock{display:flex; flex-direction:column; gap:10px;}
  #form{display:none;}
  .badge-pills{display:flex; gap:8px; margin-top:6px;}
  .pill{
    flex:1; text-align:center; padding:9px; border:1px solid var(--border); border-radius:9px;
    cursor:pointer; font-size:13px; color:var(--muted);
  }
  .pill.active{border-color:var(--accent); color:var(--accent); background:rgba(91,140,255,.1);}
</style>
</head>
<body>
<div class="wrap">
  <h1>Add a new product</h1>
  <p class="sub">Paste Google Drive links, fill the details, hit save. Your site will rebuild automatically in about a minute.</p>

  <div class="card lock" id="lockCard">
    <label>Admin password</label>
    <input type="password" id="password" placeholder="Enter password">
    <button id="unlockBtn">Unlock</button>
    <div class="msg err" id="lockMsg"></div>
  </div>

  <form class="card" id="form">
    <label>Category</label>
    <select id="category">
      <option value="drop-shoulder">Drop-Shoulder Tee</option>
      <option value="tshirt">T-Shirt</option>
      <option value="shirt">Shirt</option>
      <option value="pants">Pants</option>
      <option value="watch">Watch</option>
    </select>

    <div id="subcatWrap" style="display:none">
      <label>Subcategory</label>
      <select id="subcategory">
        <option value="baggy-pants">Baggy Pants</option>
        <option value="formal-pants">Formal Pants</option>
        <option value="cargo-pants">Cargo Pants</option>
      </select>
    </div>

    <label>Product name</label>
    <input type="text" id="name" placeholder="e.g. Essential Drop-Shoulder">

    <label>Fabric / material</label>
    <input type="text" id="fabric" placeholder="e.g. Heavy Cotton 240GSM">

    <div class="row">
      <div>
        <label>Price (₹)</label>
        <input type="number" id="price" placeholder="490">
      </div>
      <div>
        <label>Old price (optional)</label>
        <input type="number" id="old" placeholder="600">
      </div>
    </div>

    <label>Badge</label>
    <div class="badge-pills">
      <div class="pill" data-val="">None</div>
      <div class="pill" data-val="new">New</div>
      <div class="pill" data-val="sale">Sale</div>
    </div>
    <input type="hidden" id="badge" value="">

    <label>Stars (1–5)</label>
    <input type="number" id="stars" min="1" max="5" value="5">

    <label>Google Drive links (one per line — share-link or file ID)</label>
    <textarea id="photos" placeholder="https://drive.google.com/file/d/XXXXXXXX/view
https://drive.google.com/file/d/YYYYYYYY/view"></textarea>
    <div class="hint">Make sure each file is shared as "Anyone with the link can view".</div>

    <label>Description</label>
    <textarea id="desc" placeholder="Short product description shown on the site"></textarea>

    <label><input type="checkbox" id="noColour" style="width:auto;display:inline;margin-right:6px;">No colour picker for this product</label>

    <button id="saveBtn" type="submit">Save product</button>
    <div class="msg ok" id="okMsg"></div>
    <div class="msg err" id="errMsg"></div>
  </form>
</div>

<script>
  let PASSWORD = '';

  document.getElementById('unlockBtn').onclick = () => {
    PASSWORD = document.getElementById('password').value;
    if (!PASSWORD) {
      document.getElementById('lockMsg').textContent = 'Enter a password.';
      document.getElementById('lockMsg').style.display = 'block';
      return;
    }
    document.getElementById('lockCard').style.display = 'none';
    document.getElementById('form').style.display = 'block';
  };

  document.getElementById('category').addEventListener('change', (e) => {
    document.getElementById('subcatWrap').style.display = e.target.value === 'pants' ? 'block' : 'none';
  });

  document.querySelectorAll('.pill').forEach((p) => {
    p.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach((x) => x.classList.remove('active'));
      p.classList.add('active');
      document.getElementById('badge').value = p.dataset.val;
    });
  });
  document.querySelector('.pill[data-val=""]').classList.add('active');

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const saveBtn = document.getElementById('saveBtn');
    const okMsg = document.getElementById('okMsg');
    const errMsg = document.getElementById('errMsg');
    okMsg.style.display = 'none';
    errMsg.style.display = 'none';
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';

    const category = document.getElementById('category').value;
    const payload = {
      password: PASSWORD,
      category,
      subcategory: category === 'pants' ? document.getElementById('subcategory').value : undefined,
      name: document.getElementById('name').value.trim(),
      fabric: document.getElementById('fabric').value.trim(),
      price: document.getElementById('price').value,
      old: document.getElementById('old').value,
      badge: document.getElementById('badge').value || null,
      stars: document.getElementById('stars').value,
      driveLinks: document.getElementById('photos').value.split('\n').map(s => s.trim()).filter(Boolean),
      desc: document.getElementById('desc').value.trim(),
      noColour: document.getElementById('noColour').checked,
    };

    try {
      const res = await fetch('/.netlify/functions/add-product', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Something went wrong');
      okMsg.textContent = data.message;
      okMsg.style.display = 'block';
      document.getElementById('form').reset();
      document.querySelector('.pill[data-val=""]').click();
    } catch (err) {
      errMsg.textContent = err.message;
      errMsg.style.display = 'block';
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save product';
    }
  });
</script>
</body>
</html>
